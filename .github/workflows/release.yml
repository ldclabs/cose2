name: Release

# Publishes the crate to crates.io via Trusted Publishing (OIDC).
# No long-lived `CARGO_REGISTRY_TOKEN` secret is required: the GitHub Actions
# OIDC token is exchanged for a short-lived crates.io token at publish time.
#
# One-time setup on crates.io (Settings -> Trusted Publishing for the `cose2`
# crate): add a GitHub publisher with
#   owner/repo: ldclabs/cose2
#   workflow:   release.yml
#   environment: release
# See https://crates.io/docs/trusted-publishing.

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      # Required to mint the OIDC token consumed by crates-io-auth-action.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Verify the package before publishing; mirrors the CI gate so a bad tag
      # never reaches crates.io.
      - name: Test
        run: cargo test --workspace --all-targets --all-features

      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
